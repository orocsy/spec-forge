version: 2
updates:
  # npm — group minor + patch into a single weekly PR to cut noise.
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      production-deps:
        dependency-type: "production"
        update-types: ["minor", "patch"]
      dev-deps:
        dependency-type: "development"
        update-types: ["minor", "patch"]
    # Major bumps stay separate so a human reviews each.

  # GitHub Actions — pin to SHAs by default (security hygiene).
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"

  # Docker base images — only relevant if dockerfile-deploy is in the spec.
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
